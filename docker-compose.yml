services:
  # ── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbitmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-rabbitmq}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Application Services ────────────────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      AUTH_SERVICE_URL: http://auth-service:8001
      PRODUCT_SERVICE_URL: http://product-service:8002
      ORDER_SERVICE_URL: http://order-service:8003
      PAYMENT_SERVICE_URL: http://payment-service:8004
      NOTIFICATION_SERVICE_URL: http://notification-service:8005
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      ALGORITHM: HS256
      RATE_LIMIT_PUBLIC: 100
      RATE_LIMIT_AUTHED: 300
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./api-gateway:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  hyperdx:
    image: hyperdx/hyperdx-local:latest
    container_name: marketcore_hyperdx
    ports:
      - "8080:8080"
      - "4318:4318"
      - "4317:4317"
    environment:
      - HYPERDX_API_KEY=marketcore-local-dev
    volumes:
      - hyperdx-data:/data
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/market_auth_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/1
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      BASE_URL: ${AUTH_BASE_URL:-http://localhost:8001}
      OTEL_SERVICE_NAME: auth-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318/v1/traces
      HYPERDX_API_KEY: marketcore-local-dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./auth-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/market_product_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/2
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      ALGORITHM: HS256
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318/v1/traces
      HYPERDX_API_KEY: marketcore-local-dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./product-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    ports:
      - "8003:8003"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/market_order_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/3
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      ALGORITHM: HS256
      PRODUCT_SERVICE_URL: http://product-service:8002
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./order-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/market_payment_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      OTEL_SERVICE_NAME: payment-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318/v1/traces
      HYPERDX_API_KEY: marketcore-local-dev
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./payment-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    environment:
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/4
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Marketcore <onboarding@resend.dev>}
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-10}
      ARQ_JOB_TIMEOUT: ${ARQ_JOB_TIMEOUT:-30}
      ARQ_KEEP_RESULT: ${ARQ_KEEP_RESULT:-3600}
      ARQ_MAX_TRIES: ${ARQ_MAX_TRIES:-5}
      OTEL_SERVICE_NAME: notification-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318/v1/traces
      HYPERDX_API_KEY: marketcore-local-dev
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    ports:
      - "8006:8006"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/market_user_db
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbitmq}:${RABBITMQ_PASS:-rabbitmq}@rabbitmq:5672/
      SECRET_KEY: ${SECRET_KEY:-secret-key-change-in-production}
      ALGORITHM: HS256
      PERSONA_API_KEY: ${PERSONA_API_KEY:-persona_sandbox_placeholder}
      PERSONA_INQUIRY_TYPE_ID: ${PERSONA_INQUIRY_TYPE_ID:-itmpl_placeholder}
      PERSONA_WEBHOOK_SECRET: ${PERSONA_WEBHOOK_SECRET:-whsec_placeholder}
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://hyperdx:4318/v1/traces
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./user-service:/app
      - ./shared:/app/shared
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload

  notification-worker:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/4
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-Marketcore <onboarding@resend.dev>}
      ARQ_MAX_JOBS: ${ARQ_MAX_JOBS:-10}
      ARQ_JOB_TIMEOUT: ${ARQ_JOB_TIMEOUT:-30}
      ARQ_KEEP_RESULT: ${ARQ_KEEP_RESULT:-3600}
      ARQ_MAX_TRIES: ${ARQ_MAX_TRIES:-5}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./notification-service:/app
      - ./shared:/app/shared
    command: arq worker.WorkerSettings
    restart: unless-stopped

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:
  hyperdx-data:
